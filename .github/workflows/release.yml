name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tytus-macos-x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tytus-macos-aarch64
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tytus-linux-x86_64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: tytus-linux-aarch64
            archive: tar.gz
            cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build CLI
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p atomek-cli --target ${{ matrix.target }}
            cross build --release -p tytus-mcp --target ${{ matrix.target }}
          else
            cargo build --release -p atomek-cli --target ${{ matrix.target }}
            cargo build --release -p tytus-mcp --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (tar.gz)
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz tytus tytus-mcp
          cd ../../..
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} dist/ \;
          ls -la dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || sha256sum *.tar.gz > SHA256SUMS
          echo "── SHA256SUMS ──"
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false
