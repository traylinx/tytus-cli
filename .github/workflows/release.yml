name: Release

# Early-access policy: releases are manual-only while the CLI is under
# active development. Users install from source via `cargo install --git`
# through install.sh — every fix lands for them instantly without a tag.
# Flip this back to `push: tags: ['v*']` when the CLI is stable.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.4.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tytus-macos-x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tytus-macos-aarch64
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tytus-linux-x86_64
            archive: tar.gz
          # aarch64-linux via cross needs libdbus-1-dev inside the container
          # which requires a Cross.toml pre-install step. Deferred until v0.3.1
          # to avoid blocking the initial launch — install.sh falls back to
          # cargo install --git on unsupported architectures.

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      # The Linux keyring backend (keyring crate with
      # linux-native-sync-persistent + sync-secret-service) links libdbus-1
      # via libdbus-sys's build.rs. The dev header package is not in the
      # default ubuntu-latest image, so add it.
      - name: Install libdbus-1-dev (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: |
          cargo build --release -p atomek-cli --target ${{ matrix.target }}
          cargo build --release -p tytus-mcp --target ${{ matrix.target }}
        shell: bash

      - name: Package (tar.gz)
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz tytus tytus-mcp
          cd ../../..
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} dist/ \;
          ls -la dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || sha256sum *.tar.gz > SHA256SUMS
          echo "── SHA256SUMS ──"
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false
